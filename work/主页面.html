<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRAE</title>
  <style>
    :root {
      --bg: #070808;
      --panel: #161616;
      --panel-line: #2a2a2a;
      --text: #f5f5f5;
      --muted: #8a8f8b;
      --green: #16d672;
      --green-dark: #0d3a23;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 54px;
      padding: 0 22px;
      background: rgba(7, 8, 8, .72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, .06);
    }

    body {
      padding-top: 54px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 26px;
    }

    .logo {
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 1px;
      border: 1.5px solid var(--text);
      padding: 2px 7px;
      border-radius: 4px;
      line-height: 1;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .menu a,
    .menu-item {
      color: var(--text);
      font-size: 13.5px;
      text-decoration: none;
      cursor: pointer;
      opacity: .9;
      white-space: nowrap;
    }

    .menu a:hover,
    .menu-item:hover {
      opacity: 1;
    }

    .menu-item {
      position: relative;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .caret {
      font-size: 9px;
      opacity: .7;
      transition: transform .2s;
    }

    .menu-item:hover .caret {
      transform: rotate(180deg);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .login {
      color: var(--text);
      font-size: 13.5px;
      text-decoration: none;
      opacity: .9;
    }

    .login:hover {
      opacity: 1;
    }

    .btn-green {
      background: var(--green);
      color: #06210f;
      font-size: 13.5px;
      font-weight: 600;
      text-decoration: none;
      padding: 7px 16px;
      border-radius: 7px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: filter .15s;
    }

    .btn-green:hover {
      filter: brightness(1.08);
    }

    .dropdown {
      position: absolute;
      top: 30px;
      left: -12px;
      width: 248px;
      background: var(--panel);
      border: 1px solid var(--panel-line);
      border-radius: 12px;
      padding: 8px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-6px);
      transition: .18s ease;
      box-shadow: 0 18px 40px rgba(0, 0, 0, .55);
    }

    .menu-item:hover .dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .dd-item {
      display: flex;
      gap: 11px;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .dd-item:hover {
      background: rgba(255, 255, 255, .05);
    }

    .dd-icon {
      flex: none;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: #222;
      border: 1px solid #313131;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #cfcfcf;
    }

    .dd-text {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .dd-title {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text);
    }

    .badge-new {
      font-size: 9px;
      font-weight: 700;
      color: var(--green);
      border: 1px solid rgba(22, 214, 114, .5);
      border-radius: 4px;
      padding: 1px 4px;
      letter-spacing: .5px;
    }

    .plat-icons {
      display: flex;
      gap: 4px;
      color: var(--muted);
    }

    .plat-icons svg {
      width: 11px;
      height: 11px;
    }

    .dd-sub {
      font-size: 11.5px;
      color: var(--muted);
    }

    .hero {
      position: relative;
      min-height: calc(100vh - 54px);
      overflow: hidden;
    }

    #bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .hero-inner {
      position: absolute;
      left: 46px;
      right: 46px;
      bottom: 40px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 40px;
    }

    .hero-left h1 {
      font-size: 96px;
      font-weight: 800;
      letter-spacing: 2px;
      line-height: 1;
    }

    .tagline {
      margin-top: 14px;
      font-size: 30px;
      font-weight: 500;
      letter-spacing: 4px;
      color: #eaeaea;
    }

    .hero-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      text-align: right;
      padding-bottom: 6px;
    }

    .hero-right .line {
      font-size: 13px;
      color: #d6d6d6;
    }

    .dl-buttons {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .webver {
      margin-top: 6px;
      font-size: 18px;
      color: var(--muted);
      text-decoration: none;
    }

    .webver:hover {
      color: var(--text);
    }

    .promo {
      background: var(--bg);
      text-align: center;
      padding: 64px 20px 72px;
    }

    .promo-title {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: 1px;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .promo-title .cn {
      color: var(--text);
    }

    .grad {
      background: linear-gradient(90deg, #46f5a3 0%, #16d672 45%, #3aa0ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .beta {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--muted);
      border: 1px solid #3a3a3a;
      border-radius: 5px;
      padding: 2px 7px;
    }

    .promo-sub {
      margin-top: 18px;
      font-size: 14px;
      font-weight: 600;
      color: #cfcfcf;
      letter-spacing: .5px;
    }

    .promo-btn {
      margin-top: 30px;
    }

    .video-wrap {
      width: 100vw;
      height: 100vh;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: #000;
    }

    .video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @media (max-width:760px) {
      .promo-title {
        font-size: 28px;
      }

      .menu {
        display: none;
      }

      .hero-inner {
        flex-direction: column;
        align-items: flex-start;
        gap: 28px;
      }

      .hero-left h1 {
        font-size: 60px;
      }

      .tagline {
        font-size: 20px;
        letter-spacing: 2px;
      }

      .hero-right {
        align-items: flex-start;
        text-align: left;
      }

      .dl-buttons {
        flex-wrap: wrap;
      }
    }
  </style>
</head>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let w, h, dpr;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = canvas.clientWidth; h = canvas.clientHeight;
      canvas.width = w * dpr; canvas.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    function draw() {
      ctx.clearRect(0, 0, w, h);
      const gap = 14;
      for (let y = 0; y < h; y += gap) {
        for (let x = 0; x < w; x += gap) {
          const v = Math.sin(x * 0.012 + y * 0.006)
            + Math.sin(x * 0.006 - y * 0.011)
            + Math.sin((x + y) * 0.008);
          const m = (v + 3) / 6;
          if (m < 0.42) continue;
          const r = m * 1.6;
          const a = (m - 0.42) * 0.9;
          ctx.fillStyle = `rgba(150,170,160,${a.toFixed(3)})`;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
    function init() { resize(); draw(); }
    window.addEventListener('resize', () => { resize(); draw(); });
    init();
  </script>
