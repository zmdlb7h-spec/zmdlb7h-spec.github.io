<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第一个网站</title>
    <style>
        body{
            /*取消内外边距*/
            margin: 0;
            padding: 0;
            /*100%窗口高度*/
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(125deg,rgb(157, 195, 207),rgb(178, 177, 199));
            background-size: 500%;
            animation: bg 3s linear infinite;
        }
        .text{
            font-size: 30px;
            letter-spacing: 15px;
        }
        @keyframes bg{
        0%{
            background-position: 0% 50%;
        }
        50%{
            background-position: 100% 50%;
        }
        100%{
            background-position: 0% 50%;
        }
        }
    </style>
</head>
<body>
    
</body>
</html>
