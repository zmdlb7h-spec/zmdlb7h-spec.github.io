<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(75deg, #d5c4a1, #b8a99a, #a89f91);
        background-size: 200%;
        animation: bg 5s linear infinite;
    }
        .text{
            font-size: 30px;
            letter-spacing: 15px;}
    @keyframes bg{
        0%{background-position: 0%,50%}
        50%{background-position: 50%,100%;}
        100%{background-position: 0%,50%}
    }
    </style>
</head>
<body>
    <div，class="text">你好呀</div>
</body>
</html>
