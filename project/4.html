<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../des/鼠标跟随.css" />
    <script src="../des/鼠标跟随.js" defer></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        margin: 0;
        padding: 20px;
        background: white;
        height: 100vh;
        overflow: hidden;
      }
      .background {
        background: url(../image/4.图片/banner1.jpg) no-repeat center / cover;
        height: 100%;
        position: relative;
      }
      .a1 {
        width: 150px;
        height: 150px;
        background: url(../image/4.图片/arrow1.png) no-repeat center/cover;
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        left: 20px;
      }
      .a2 {
        width: 150px;
        height: 150px;
        background: url(../image/4.图片/arrow2.png) no-repeat center/cover;
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        right: 20px;
      }
      .point {
        position: absolute;
        bottom: 20px;
        left: 50%;
        display: flex;
        transform: translateX(-50%);
      }
      .point div {
        width: 50px;
        height: 50px;
        margin: 0 20px;
        background-repeat: no-repeat;
        background-size: cover;
      }
    </style>
  </head>
  <body>
    <img
      id="cursor-img"
      src="../image/光标.png"
      onerror="document.body.style.cursor = 'auto'"
    />
    <div class="background">
      <div class="a1"></div>
      <div class="a2"></div>
      <div class="point">
        <div
          class="a3"
          style="background-image: url(../image/4.图片/point1.png)"
        ></div>
        <div
          class="a4"
          style="background-image: url(../image/4.图片/point2.png)"
        ></div>
        <div
          class="a5"
          style="background-image: url(../image/4.图片/point1.png)"
        ></div>
        <div
          class="a6"
          style="background-image: url(../image/4.图片/point1.png)"
        ></div>
      </div>
    </div>
  </body>
</html>
