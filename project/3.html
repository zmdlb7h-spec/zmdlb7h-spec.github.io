<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../font/iconfont.css" />
    <title>盒模型</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(
          rgb(240, 232, 232),
          rgb(108, 168, 163),
          pink
        );
      }
      div {
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 15px;
      }
      #a1 {
        background: linear-gradient(
          rgb(50, 50, 203),
          rgb(76, 207, 111),
          rgb(255, 142, 249)
        );
        width: 500px;
        height: 500px;
        border-radius: 0%;
      }
      #a2 {
        background: linear-gradient(
          45deg,
          rgb(177, 159, 159),
          rgb(84, 253, 225),
          rgb(107, 94, 94)
        );
        width: 250px;
        height: 250px;
      }
      #a3 {
        background: linear-gradient(
          45deg,
          rgb(205, 176, 176),
          rgb(155, 186, 155),
          rgb(148, 148, 173)
        );
        width: 150px;
        height: 100px;
        border: 20px solid black;
      }
      #a4 > .iconfont {
        font-size: 50px;
      }
    </style>
  </head>
  <body>
    <div id="a1">
      <div id="a2">
        <div id="a3">
          <div id="a4">
            <span class="iconfont icon-bofang"></span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
