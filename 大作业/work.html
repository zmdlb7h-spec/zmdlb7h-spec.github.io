<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRAE Work · 不止于码 大有可为</title>
  <style>
    :root {
      --bg: #070808;
      --panel: #141414;
      --panel-line: #2a2a2a;
      --text: #f5f5f5;
      --muted: #8a8f8b;
      --green: #16d672;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      padding-top: 54px;
      min-height: 100vh;
    }

    #bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 54px;
      padding: 0 22px;
      background: rgba(7, 8, 8, .72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, .06);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 26px;
    }

    .logo {
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 1px;
      border: 1.5px solid var(--text);
      padding: 2px 7px;
      border-radius: 4px;
      line-height: 1;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .menu a,
    .menu-item {
      color: var(--text);
      font-size: 13.5px;
      text-decoration: none;
      cursor: pointer;
      opacity: .9;
      white-space: nowrap;
    }

    .menu a:hover,
    .menu-item:hover {
      opacity: 1;
    }

    .menu-item {
      position: relative;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .caret {
      font-size: 9px;
      opacity: .7;
      transition: transform .2s;
    }

    .menu-item:hover .caret {
      transform: rotate(180deg);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .login {
      color: var(--text);
      font-size: 13.5px;
      text-decoration: none;
      opacity: .9;
    }

    .btn-green {
      background: var(--green);
      color: #06210f;
      font-size: 13.5px;
      font-weight: 600;
      text-decoration: none;
      padding: 7px 16px;
      border-radius: 7px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      border: none;
      transition: filter .15s;
    }

    .btn-green:hover {
      filter: brightness(1.08);
    }

    .dropdown {
      position: absolute;
      top: 30px;
      left: -12px;
      width: 248px;
      background: var(--panel);
      border: 1px solid var(--panel-line);
      border-radius: 12px;
      padding: 8px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-6px);
      transition: .18s ease;
      box-shadow: 0 18px 40px rgba(0, 0, 0, .55);
    }

    .menu-item:hover .dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .dd-item {
      display: flex;
      gap: 11px;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .dd-item:hover {
      background: rgba(255, 255, 255, .05);
    }

    .dd-icon {
      flex: none;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: #222;
      border: 1px solid #313131;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #cfcfcf;
    }

    .dd-text {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .dd-title {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text);
    }

    .badge-new {
      font-size: 9px;
      font-weight: 700;
      color: var(--green);
      border: 1px solid rgba(22, 214, 114, .5);
      border-radius: 4px;
      padding: 1px 4px;
      letter-spacing: .5px;
    }

    .dd-sub {
      font-size: 11.5px;
      color: var(--muted);
    }

    .grad {
      background: linear-gradient(90deg, #46f5a3 0%, #16d672 45%, #3aa0ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: 56px 20px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .5px;
      margin-bottom: 18px;
    }

    .eyebrow .cn {
      color: var(--text);
    }

    .beta {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #0c2b1a;
      background: var(--green);
      border-radius: 4px;
      padding: 2px 6px;
    }

    .headline {
      font-size: 58px;
      font-weight: 800;
      letter-spacing: 4px;
      line-height: 1.1;
      text-align: center;
      margin-bottom: 40px;
      background: linear-gradient(100deg, #ffffff 0%, #d7fbe9 40%, #34e39a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .composer {
      width: 100%;
      background: var(--panel);
      border: 1px solid #2c2c2c;
      border-radius: 16px;
      padding: 18px 18px 12px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, .4);
    }

    .composer textarea {
      width: 100%;
      min-height: 120px;
      resize: none;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      font-family: inherit;
    }

    .composer textarea::placeholder {
      color: #6c706d;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #242424;
    }

    .tool-left,
    .tool-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid #2e2e2e;
      color: #b9bdba;
      cursor: pointer;
      transition: .15s;
    }

    .icon-btn:hover {
      background: #1e1e1e;
      color: var(--text);
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: var(--green);
      color: #06210f;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter .15s;
    }

    .send-btn:hover {
      filter: brightness(1.08);
    }

    .cards {
      width: 100%;
      margin-top: 26px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .card {
      flex: 1 1 calc(50% - 7px);
      min-width: 260px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--panel);
      border: 1px solid #262626;
      border-radius: 12px;
      padding: 16px 16px;
      cursor: pointer;
      color: var(--text);
      transition: .18s;
    }

    .card:hover {
      background: #1b1b1b;
      border-color: #3a3a3a;
      transform: translateY(-2px);
    }

    .card-ic {
      flex: none;
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: #202020;
      border: 1px solid #313131;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--green);
    }

    .card-txt {
      font-size: 13.5px;
      color: #d6d6d6;
      line-height: 1.4;
    }

    .banner {
      width: 100%;
      margin-top: 34px;
      min-height: 120px;
      border-radius: 16px;
      border: 1px solid #1f3a2c;
      background: linear-gradient(to top, #0c3a24 0%, #0e241c 45%, #0a0c0b 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 26px 30px;
      gap: 20px;
    }

    .banner-txt h3 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .banner-txt p {
      font-size: 13px;
      color: #9fc7b3;
    }

    @media (max-width:760px) {
      .menu {
        display: none;
      }

      .headline {
        font-size: 34px;
        letter-spacing: 2px;
      }

      .card {
        flex: 1 1 100%;
      }

      .banner {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let w, h, dpr;
    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = canvas.clientWidth; h = canvas.clientHeight;
      canvas.width = w * dpr; canvas.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    function draw() {
      ctx.clearRect(0, 0, w, h);
      const gap = 14;
      for (let y = 0; y < h; y += gap) {
        for (let x = 0; x < w; x += gap) {
          const v = Math.sin(x * 0.012 + y * 0.006)
            + Math.sin(x * 0.006 - y * 0.011)
            + Math.sin((x + y) * 0.008);
          const m = (v + 3) / 6;
          if (m < 0.42) continue;
          const r = m * 1.6;
          const a = (m - 0.42) * 0.9;
          ctx.fillStyle = `rgba(150,170,160,${a.toFixed(3)})`;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
    function init() { resize(); draw(); }
    window.addEventListener('resize', () => { resize(); draw(); });
    init();
  </script>
